name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'server/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore server/ServiceFlow.sln

    - name: Build backend
      run: dotnet build server/ServiceFlow.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test server/ServiceFlow.sln --configuration Release --no-build --verbosity normal
